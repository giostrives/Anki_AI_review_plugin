<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .word-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .word {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .input-area {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-btn {
            background: #667eea;
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .feedback-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .feedback-area.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .feedback-text {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
        }

        .rating-buttons {
            display: none;
            gap: 10px;
        }

        .rating-buttons.show {
            display: flex;
        }

        .rating-btn {
            background: #e0e0e0;
            color: #333;
        }

        .rating-btn:hover {
            background: #d0d0d0;
        }

        .rating-btn.again { background: #ff6b6b; color: white; }
        .rating-btn.hard { background: #ffa500; color: white; }
        .rating-btn.good { background: #51cf66; color: white; }
        .rating-btn.easy { background: #339af0; color: white; }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="word-display">
            <div class="word" id="word"></div>
            <div class="instruction" id="instruction"></div>
        </div>

        <div class="input-area">
            <textarea id="answer" placeholder="Type your answer here..."></textarea>
        </div>

        <div class="button-group">
            <button class="submit-btn" id="submitBtn">Submit</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Evaluating with AI...</p>
        </div>

        <div class="feedback-area" id="feedback">
            <div class="feedback-title">AI Feedback</div>
            <div class="feedback-text" id="feedbackText"></div>
        </div>

        <div class="rating-buttons" id="ratingButtons">
            <button class="rating-btn again" onclick="submitRating(1)">Again</button>
            <button class="rating-btn hard" onclick="submitRating(2)">Hard</button>
            <button class="rating-btn good" onclick="submitRating(3)">Good</button>
            <button class="rating-btn easy" onclick="submitRating(4)">Easy</button>
        </div>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        let bridge;
        let cardData;
        let mode; // 'sentence' or 'translate'

        async function loadCard() {
            console.log("Loading card...");
            try {
                // Get card data from Python
                const dataStr = await bridge.getCardData();
                console.log("Received data:", dataStr);
                cardData = JSON.parse(dataStr);
                console.log("Parsed card data:", cardData);

                // ... rest of the function
            } catch (error) {
                console.error("Error loading card:", error);
            }
        }

        async function loadCard() {
            // Get card data from Python
            const dataStr = await bridge.getCardData();
            cardData = JSON.parse(dataStr);

            // Determine mode: if showing front (source), write sentence in target
            // If showing back (target), translate to source
            const showingFront = Math.random() > 0.5; // For now, random. Can be based on card state

            if (showingFront) {
                mode = 'sentence';
                document.getElementById('word').textContent = cardData.front;
                document.getElementById('instruction').textContent =
                    `Write a sentence using this word in ${cardData.target_language}`;
            } else {
                mode = 'translate';
                document.getElementById('word').textContent = cardData.back;
                document.getElementById('instruction').textContent =
                    `Translate this word to ${cardData.source_language}`;
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async function() {
            const answer = document.getElementById('answer').value.trim();

            if (!answer) {
                alert('Please enter an answer');
                return;
            }

            // Disable submit button and show loading
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').classList.add('show');

            // Evaluate with AI
            const evaluation = await evaluateAnswer(answer);

            // Hide loading, show feedback
            document.getElementById('loading').classList.remove('show');
            document.getElementById('feedback').classList.add('show');
            document.getElementById('feedbackText').textContent = evaluation.feedback;

            // Show rating buttons
            document.getElementById('ratingButtons').classList.add('show');
        });

        async function evaluateAnswer(answer) {
            const prompt = mode === 'sentence'
                ? `Evaluate if the student knows the word "${cardData.front}" (${cardData.source_language}) based on their sentence in ${cardData.target_language}: "${answer}"

The word should translate to: "${cardData.back}"

Check:
1. Did they use the correct word/translation?
2. Is the grammar acceptable (minor mistakes OK)?
3. Is the usage contextually appropriate?

Respond with:
- PASS or FAIL on the first line
- Then provide brief, encouraging feedback (2-3 sentences)

Be lenient - if they clearly know the word despite minor grammar mistakes, mark as PASS.`
                : `Evaluate if the student correctly translated "${cardData.back}" (${cardData.target_language}) to ${cardData.source_language}.

Their answer: "${answer}"
Expected: "${cardData.front}"

Check if the translation is correct (accept synonyms and variations).

Respond with:
- PASS or FAIL on the first line
- Then provide brief feedback (1-2 sentences)`;

            try {
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'gemma3',
                        prompt: prompt,
                        stream: false
                    })
                });

                const data = await response.json();
                const aiResponse = data.response;

                // Parse response
                const lines = aiResponse.split('\n');
                const status = lines[0].toUpperCase().includes('PASS') ? 'PASS' : 'FAIL';
                const feedback = lines.slice(1).join('\n').trim();

                return {
                    passed: status === 'PASS',
                    feedback: feedback || aiResponse
                };

            } catch (error) {
                console.error('Ollama error:', error);
                return {
                    passed: true,
                    feedback: 'Could not connect to Ollama. Marking as correct by default. Please check if Ollama is running.'
                };
            }
        }

        async function submitRating(ease) {
            const result = {
                ease: ease
            };

            await bridge.submitAnswer(JSON.stringify(result));
        }
    </script>
</body>
</html>
